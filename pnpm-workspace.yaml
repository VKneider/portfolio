# pnpm 11+ workspace settings (single-project setup, no workspace).
# Allowlist de paquetes con install scripts permitidos (ignoreScripts=true en .npmrc).
allowBuilds:
  sharp: true
  slicejs-cli: true
minimumReleaseAgeExclude:
  - slicejs-cli@3.5.0
  - slicejs-web-framework@3.3.1
  - slicejs-cli@3.7.1
  - slicejs-web-framework@3.5.1
