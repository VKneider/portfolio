<section class="charts-page">
  <header class="charts-header">
    <h1>Charts Playground</h1>
    <p>Simple Chart.js render with dynamic updates and sanitized labels.</p>
  </header>

  <div class="charts-controls">
    <button class="charts-update-button" type="button">Update chart data</button>
  </div>

  <div class="charts-canvas-wrap">
    <canvas class="charts-canvas" aria-label="Demo chart" role="img"></canvas>
  </div>

  <div class="charts-sanitize" aria-live="polite"></div>
</section>
