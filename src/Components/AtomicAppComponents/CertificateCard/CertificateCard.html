<div class="certificate-card">
   <div class="certificate-header">
      <div class="issuer-mark">
         <img class="issuer-logo" alt="Issuer logo">
         <span class="issuer-initials"></span>
      </div>
      <div class="header-text">
         <h3 class="certificate-title"></h3>
         <h4 class="certificate-issuer"></h4>
      </div>
   </div>

   <p class="certificate-description"></p>

   <div class="certificate-meta">
      <div class="certificate-dates"></div>
      <div class="credential-id"></div>
   </div>

   <div class="certificate-skills">
      <h5>Focus</h5>
      <div class="skills-list"></div>
   </div>

   <div class="certificate-actions"></div>
</div>
